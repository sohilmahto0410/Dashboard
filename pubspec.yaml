name: expense_dashboard
description: A beautiful, animated expense dashboard flutter application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.66.0
  excel: ^3.0.0
  file_picker: ^8.0.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  lucide_icons: ^0.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
